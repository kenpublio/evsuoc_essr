name: Test Deploy to Hostinger

on:
  push:
    branches:
      - prod
  workflow_dispatch:

concurrency:
  group: deploy-hostinger
  cancel-in-progress: false
      
jobs:
  deploy:
    name: Upload files and run database migrations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout production code  
        uses: actions/checkout@v4

      - name: Configure SSH access
        shell: bash
        run: |
          # Stop the workflow if any command fails 
          set -euo pipefail
          # Create SSH folder used by the runner  
          mkdir -p ~/.ssh
          # Write the Hostinger private key from GitHub Secrets into a temporary key file 
          printf '%s\n' "${{ secrets.HOSTINGER_PRIVATE_KEY }}" > ~/.ssh/hostinger_key
          # Restrict the permissions to read and write 
          chmod 600 ~/.ssh/hostinger_key
          # Save Hostinger's server fingerprint so SSH can connect from GitHub to Hostinger 
          ssh-keyscan -p 65002 145.79.14.190 >> ~/.ssh/known_hosts

      - name: Test SSH Connection
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/hostinger_key -p 65002 u656591888@145.79.14.190 "echo 'SSH connection successful'"

      - name: Upload new and modified files
        shell: bash
        run: |
          set -euo pipefail
          RSYNC_SSH="ssh -i ~/.ssh/hostinger_key -p 65002" 
          RSYNC_OPTIONS=(
            -avz
            --exclude ".git/"
            --exclude ".github/"
            --exclude "node_modules/"
            --exclude ".env"
            --exclude "package-lock.json"
            --exclude "package.json"
          )
          rsync "${RSYNC_OPTIONS[@]}" -e "$RSYNC_SSH" ./ u656591888@145.79.14.190:/home/u656591888/domains/yourdomain.com/public_html/

      - name: Run database migrations
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/hostinger_key -p 65002 u656591888@145.79.14.190 "cd /home/u656591888/domains/yourdomain.com/public_html && php app/run_migrations.php"