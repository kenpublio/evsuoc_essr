name: Hostinger Deploy
on:
  push:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
      HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
      HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
      HOSTINGER_PATH: ${{ secrets.HOSTINGER_PATH }}
    steps:
      - name: Checkout production code
        uses: actions/checkout@v4

      - name: Configure SSH access
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_PRIVATE_KEY }}" > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key
          ssh-keyscan -p "$HOSTINGER_PORT" "$HOSTINGER_HOST" >> ~/.ssh/known_hosts

      - name: Upload new and modified files
        shell: bash
        run: |
          set -euo pipefail
          RSYNC_SSH="ssh -i ~/.ssh/hostinger_key -p $HOSTINGER_PORT"
          RSYNC_OPTIONS=(
            -a
            -z
            --exclude ".git/"
            --exclude ".github/"
            --exclude "node_modules/"
            --exclude ".env"
            --exclude "package-lock.json"
            --exclude "package.json"
          )
          rsync "${RSYNC_OPTIONS[@]}" -e "$RSYNC_SSH" ./ "$HOSTINGER_USER@$HOSTINGER_HOST:$HOSTINGER_PATH/"

      - name: Run database migrations
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/hostinger_key -p "$HOSTINGER_PORT" "$HOSTINGER_USER@$HOSTINGER_HOST" "cd $HOSTINGER_PATH && php app/run_migrations.php"

          
       

          

 